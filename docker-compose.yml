services:
  jenkins:
    image: salesforce-jenkins-custom
    container_name: salesforce-jenkins
    restart: unless-stopped
    user: root
    ports:
      - "8081:8080"
      - "50001:50000"
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock

volumes:
  jenkins_home:
